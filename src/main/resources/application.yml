# Datasource credentials are loaded from environment variables or the active Spring profile.
# See the Usage section in the project root README for setup/compilation instructions.

spring:
  profiles:
    default: prod

  main:
    banner-mode: off

  datasource:
    driver-class-name: org.postgresql.Driver

    jdbcUrl: ${SPRING_DATASOURCE_JDBCURL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

    hikari:
      # PostgreSQL performance tuning
      data-source-properties:
        # Enable prepared statement caching
        preparedStatementCacheQueries: 256
        preparedStatementCacheSizeMiB: 5

        # Enable binary transfer mode for better performance
        binaryTransfer: true

        # Socket timeout (prevents hanging connections)
        socketTimeout: 30

        # Connection timeout for establishing connection
        connectTimeout: 10

        # TCP keepalive
        tcpKeepAlive: true

  # Skip automatic database initialization (i.e. schema.sql lookup)
  sql:
    init:
      mode: never

# Debug configs
logging:
  level:
    com.zaxxer.hikari: DEBUG
