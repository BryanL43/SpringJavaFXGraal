# NOTE: Database credentials must be provided via environment variables at runtime.
# Refer to `.run/README.md` for IntelliJ setup and root README Usage section for compiling.

spring:
  main:
    banner-mode: off

  datasource:
    driver-class-name: org.postgresql.Driver

    hikari:
      # PostgreSQL performance tuning
      data-source-properties:
        # Enable prepared statement caching
        preparedStatementCacheQueries: 256
        preparedStatementCacheSizeMiB: 5

        # Enable binary transfer mode for better performance
        binaryTransfer: true

        # Socket timeout (prevents hanging connections)
        socketTimeout: 30

        # Connection timeout for establishing connection
        connectTimeout: 10

        # TCP keepalive
        tcpKeepAlive: true

  # Skip automatic database initialization (i.e. schema.sql lookup)
  sql:
    init:
      mode: never

# Debug configs
logging:
  level:
    com.zaxxer.hikari: DEBUG
