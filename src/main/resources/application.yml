# NOTE: spring datasource url, username, & password must be supplied at runtime.
# Please refer to `.run/README.md` for more information.

spring:
  datasource:
    # Required by HikariCP because url and jdbcUrl are treated as separate properties
    jdbcUrl: ${spring.datasource.url}

    driver-class-name: org.postgresql.Driver

    hikari:
      # PostgreSQL performance tuning
      data-source-properties:
        # Enable prepared statement caching
        preparedStatementCacheQueries: 256
        preparedStatementCacheSizeMiB: 5

        # Enable binary transfer mode for better performance
        binaryTransfer: true

        # Socket timeout (prevents hanging connections)
        socketTimeout: 30

        # Connection timeout for establishing connection
        connectTimeout: 10

        # TCP keepalive
        tcpKeepAlive: true

  # Skip automatic database initialization (i.e. schema.sql lookup)
  sql:
    init:
      mode: never

# Debug configs
logging:
  level:
    com.zaxxer.hikari: DEBUG
