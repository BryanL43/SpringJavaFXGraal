name: Build Windows Native Executable

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      SPRING_DATASOURCE_JDBCURL: ${{ secrets.SPRING_DATASOURCE_JDBCURL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Tagging example: git tag v1.0.1; git push origin v1.0.1
      - name: Determine tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "dev-${{ github.run_number }}"
          }

          Write-Host "Using tag: $tag"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Embed datasource credentials for a locally hosted database instance.
      # If the database is hosted behind a service,
      # remove this and load credentials from that service.
      - name: Generate application-prod.yml
        shell: pwsh
        run: |
          @"
          spring:
            datasource:
              jdbcUrl: ${{ secrets.SPRING_DATASOURCE_JDBCURL }}
              username: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
              password: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          "@ | Out-File -Encoding utf8 src/main/resources/application-prod.yml

      - name: Build and test
        run: .\mvnw -B clean package

      - name: Run tracing agent
        run: .\mvnw -B test -Pnative-trace

      - name: Build native executable
        run: .\mvnw -B package -Pnative

      - name: Locate executable
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path target -Filter *.exe -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (!$exe) {
            Write-Error "Native executable not found in target directory"
            exit 1
          }

          Write-Host "Found executable: $($exe.FullName)"

          # Export for later steps
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppExe="${{ steps.find_exe.outputs.exe_path }}" `
            installer\installer.iss

      - name: Verify installer exists
        shell: pwsh
        run: |
          $files = Get-ChildItem target\*Installer*.exe
          if (!$files) {
            Write-Error "Installer not found"
            exit 1
          }

      # Manual runs upload artifacts for debugging; no release is created
      - name: Upload build artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: dev-build-${{ steps.tag.outputs.tag }}
          path: |
            target/*.jar
            target/*.exe
          retention-days: 1

      # Run only when triggered by a Git tag push
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: target/*Installer*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
