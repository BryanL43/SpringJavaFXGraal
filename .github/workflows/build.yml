name: Build Windows Native Executable

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create (e.g. v1.0.0). Leave empty to auto-generate'
        required: false
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - name: Determine tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $tag = "${{ github.ref_name }}"
          } elseif ("${{ github.event.inputs.tag }}") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "v0.0.${{ github.run_number }}"
          }

          Write-Host "Using tag: $tag"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Create tag (if necessary)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test
        run: .\mvnw -B clean verify

      - name: Run tracing agent
        run: .\mvnw -B test -Pnative-trace

      - name: Build native executable
        run: .\mvnw -B package -Pnative

      - name: Locate executable
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path target -Filter *.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1

          if (!$exe) {
            Write-Error "No .exe found in target directory"
            exit 1
          }

          Write-Host "Found executable: $($exe.FullName)"

          # Export for later steps
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: ${{ steps.find_exe.outputs.exe_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
